<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ネガギルド | Nega-Guild</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <canvas id="brandSeal" width="44" height="44" aria-hidden="true"></canvas>
          <div>
            <h1>ネガギルド</h1>
            <p>Nega-Guild</p>
          </div>
        </div>
        <nav class="tabs" aria-label="ビュー切り替え">
          <button class="tab active" data-filter="all" type="button">全クエスト</button>
          <button class="tab" data-filter="raid" type="button">世界災厄</button>
          <button class="tab" data-filter="cleared" type="button">討伐済</button>
        </nav>
        <div class="status-strip" aria-label="ギルド状況">
          <span><strong id="guildHeat">82</strong> 熱量</span>
          <span><strong id="activeCount">0</strong> 体出現中</span>
        </div>
      </header>

      <main class="layout">
        <aside class="summon-panel panel">
          <div class="panel-heading">
            <span class="eyebrow">Summon</span>
            <h2>召喚</h2>
          </div>

          <form id="summonForm" class="summon-form">
            <label for="rantInput">今日の理不尽</label>
            <textarea
              id="rantInput"
              name="rant"
              rows="7"
              maxlength="180"
              placeholder="例：上司の指示が昨日と違う"
              required
            ></textarea>

            <div class="rage-row">
              <label for="rageInput">怒り度</label>
              <output id="rageValue" for="rageInput">64</output>
            </div>
            <input id="rageInput" name="rage" type="range" min="10" max="100" value="64" />

            <div class="privacy-line">
              <span>実名検知</span>
              <strong id="privacyState">結界安定</strong>
            </div>

            <button class="primary-action" type="submit">
              <span aria-hidden="true">⚔</span>
              魔物化して流す
            </button>
          </form>

          <section class="panel-block">
            <h3>召喚プレビュー</h3>
            <div id="previewCard" class="mini-monster">
              <canvas id="previewMonster" width="180" height="140" aria-label="召喚される魔物"></canvas>
              <div>
                <strong id="previewName">ブレルノドン予兆体</strong>
                <span id="previewMeta">混乱 / HP 164</span>
              </div>
            </div>
          </section>
        </aside>

        <section class="feed-column">
          <div class="feed-header">
            <div>
              <span class="eyebrow">Guild Board</span>
              <h2>受注掲示板</h2>
            </div>
            <div class="sort-menu">
              <label for="sortSelect">並び</label>
              <select id="sortSelect">
                <option value="hot">熱量順</option>
                <option value="new">新着順</option>
                <option value="danger">残HP順</option>
              </select>
            </div>
          </div>

          <div id="raidBanner" class="raid-banner"></div>
          <div id="questFeed" class="quest-feed" aria-live="polite"></div>
        </section>

        <aside class="side-column">
          <section class="panel profile-panel">
            <div class="profile-top">
              <canvas id="heroPortrait" width="76" height="76" aria-label="英雄プロフィール"></canvas>
              <div>
                <span class="eyebrow">Hero</span>
                <h2>名無しの浄化士</h2>
                <p id="activeTitle">満員電車を生き延びし見習い</p>
              </div>
            </div>
            <div class="meter">
              <div class="meter-label">
                <span>Lv.<strong id="heroLevel">7</strong></span>
                <span><strong id="heroXp">1240</strong> XP</span>
              </div>
              <div class="meter-track"><span id="xpBar"></span></div>
            </div>
            <div class="title-picks" id="titlePicks"></div>
          </section>

          <section class="panel raid-panel">
            <div class="panel-heading">
              <span class="eyebrow">Raid</span>
              <h2>世界災厄</h2>
            </div>
            <div id="raidCard"></div>
          </section>

          <section class="panel log-panel">
            <div class="panel-heading">
              <span class="eyebrow">Log</span>
              <h2>名誉ログ</h2>
            </div>
            <ul id="honorLog"></ul>
          </section>
        </aside>
      </main>
    </div>

    <template id="questTemplate">
      <article class="quest-card">
        <div class="quest-main">
          <canvas class="monster-art" width="176" height="132" aria-hidden="true"></canvas>
          <div class="quest-body">
            <div class="quest-title-row">
              <div>
                <span class="quest-class"></span>
                <h3></h3>
              </div>
              <span class="quest-status"></span>
            </div>
            <p class="quest-copy"></p>
            <div class="tags"></div>
            <div class="hp-line">
              <span class="hp-text"></span>
              <div class="hp-track"><span></span></div>
            </div>
          </div>
        </div>
        <div class="quest-actions">
          <button class="icon-action empathize" type="button" title="共感で削る">♡ わかる</button>
          <button class="icon-action cheer" type="button" title="慰めのスキル">✦ 慰め</button>
          <div class="skill-input">
            <input type="text" maxlength="80" placeholder="大喜利スキルを放つ" />
            <button type="button">放つ</button>
          </div>
        </div>
        <div class="comments"></div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
